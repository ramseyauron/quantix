version: "3.9"

# Monitoring stack — attach to devnet or testnet network as needed
# Usage:
#   devnet:  docker compose -f docker-compose.yml -f docker-compose-monitoring.yml up -d
#   testnet: docker compose -f docker-compose-testnet.yml -f docker-compose-monitoring.yml up -d

networks:
  quantix-testnet:
    external: true
    name: quantix_quantix-testnet
  monitoring:
    driver: bridge

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: quantix-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
      - quantix-testnet

  grafana:
    image: grafana/grafana:latest
    container_name: quantix-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/quantix.json:ro
      - ./deploy/grafana/datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=quantix
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/quantix.json
    depends_on:
      - prometheus
    networks:
      - monitoring

volumes:
  prometheus-data:
  grafana-data:
