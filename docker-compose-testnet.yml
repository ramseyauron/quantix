version: "3.9"

# 4-validator testnet
# validator-0: RPC=8560, P2P=32307, WS=8700
# validator-1: RPC=8561, P2P=32308, WS=8701
# validator-2: RPC=8562, P2P=32309, WS=8702
# validator-3: RPC=8563, P2P=32310, WS=8703

networks:
  quantix-testnet:
    driver: bridge

services:
  validator-0:
    build: .
    container_name: quantix-validator-0
    restart: unless-stopped
    networks: [quantix-testnet]
    ports:
      - "8560:8560"
      - "32307:32307"
      - "8700:8700"
    volumes:
      - ./data/validator-0:/app/data
    environment:
      - QUANTIX_ENV=testnet
      - QUANTIX_NETWORK=testnet
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
    command:
      - -nodes
      - "4"
      - -node-index
      - "0"
      - -roles
      - validator,validator,validator,validator
      - -datadir
      - /app/data
      - -http-port
      - "0.0.0.0:8560"
      - -udp-port
      - "32307"
      - -tcp-addr
      - "0.0.0.0:32307"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8560/blockcount"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  validator-1:
    build: .
    container_name: quantix-validator-1
    restart: unless-stopped
    networks: [quantix-testnet]
    ports:
      - "8561:8561"
      - "32308:32308"
      - "8701:8701"
    volumes:
      - ./data/validator-1:/app/data
    environment:
      - QUANTIX_ENV=testnet
      - QUANTIX_NETWORK=testnet
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
    command:
      - -nodes
      - "4"
      - -node-index
      - "1"
      - -roles
      - validator,validator,validator,validator
      - -datadir
      - /app/data
      - -http-port
      - "0.0.0.0:8561"
      - -udp-port
      - "32308"
      - -tcp-addr
      - "0.0.0.0:32308"
      - -seeds
      - "validator-0:32307"
      - -seed-http-port
      - "8560"
    depends_on:
      validator-0:
        condition: service_healthy

  validator-2:
    build: .
    container_name: quantix-validator-2
    restart: unless-stopped
    networks: [quantix-testnet]
    ports:
      - "8562:8562"
      - "32309:32309"
      - "8702:8702"
    volumes:
      - ./data/validator-2:/app/data
    environment:
      - QUANTIX_ENV=testnet
      - QUANTIX_NETWORK=testnet
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
    command:
      - -nodes
      - "4"
      - -node-index
      - "2"
      - -roles
      - validator,validator,validator,validator
      - -datadir
      - /app/data
      - -http-port
      - "0.0.0.0:8562"
      - -udp-port
      - "32309"
      - -tcp-addr
      - "0.0.0.0:32309"
      - -seeds
      - "validator-0:32307"
      - -seed-http-port
      - "8560"
    depends_on:
      validator-0:
        condition: service_healthy

  validator-3:
    build: .
    container_name: quantix-validator-3
    restart: unless-stopped
    networks: [quantix-testnet]
    ports:
      - "8563:8563"
      - "32310:32310"
      - "8703:8703"
    volumes:
      - ./data/validator-3:/app/data
    environment:
      - QUANTIX_ENV=testnet
      - QUANTIX_NETWORK=testnet
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
    command:
      - -nodes
      - "4"
      - -node-index
      - "3"
      - -roles
      - validator,validator,validator,validator
      - -datadir
      - /app/data
      - -http-port
      - "0.0.0.0:8563"
      - -udp-port
      - "32310"
      - -tcp-addr
      - "0.0.0.0:32310"
      - -seeds
      - "validator-0:32307"
      - -seed-http-port
      - "8560"
    depends_on:
      validator-0:
        condition: service_healthy
