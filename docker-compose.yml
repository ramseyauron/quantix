version: "3.9"

services:
  quantix-devnet:
    build: .
    container_name: quantix-devnet
    restart: unless-stopped
    ports:
      - "8560:8560"    # HTTP RPC
      - "32421:32421"  # P2P TCP
      - "8700:8700"    # WebSocket
    volumes:
      - quantix-devnet-data:/data
    environment:
      - QUANTIX_ENV=devnet
      - QUANTIX_LOG_LEVEL=debug
    command: ["node", "--devnet", "--data-dir=/data", "--http-port=8560", "--p2p-port=32421", "--ws-port=8700"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8560/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  quantix-devnet-data:
