version: "3.9"

services:
  quantix-devnet:
    build: .
    container_name: quantix-devnet
    restart: unless-stopped
    ports:
      - "8560:8560"    # HTTP RPC
      - "32307:32307"  # P2P TCP/UDP
      - "8700:8700"    # WebSocket
    volumes:
      - ./data/devnet:/app/data
    environment:
      - QUANTIX_ENV=devnet
    command:
      - -nodes
      - "1"
      - -node-index
      - "0"
      - -roles
      - validator
      - -datadir
      - /app/data
      - -http-port
      - "0.0.0.0:8560"
      - -udp-port
      - "32307"
      - -tcp-addr
      - "0.0.0.0:32307"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8560/blockcount"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
